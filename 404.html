<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Page Not Found</title>
    <meta name="theme-color" content="#050505">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: var(--bg-color, #070606);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }
        .error-container {
            position: relative;
            z-index: 10;
        }
        h1 {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #41FAC6, #FA6D0F);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            line-height: 1;
        }
        p {
            font-size: 1.25rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <!-- Page Transition Overlay -->
    <div id="page-transition-overlay" class="page-transition-overlay active"></div>

    <div class="error-container fade-in">
        <h1>404</h1>
        <p>The page you are looking for has vanished into the void.</p>
        <a href="index.html" class="btn primary-btn" style="display: inline-block;">Return to Safe Zone</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
